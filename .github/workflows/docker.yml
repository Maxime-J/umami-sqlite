name: Docker image
run-name: Publish Docker image
on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Prepare
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> $GITHUB_ENV
          echo "REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV

      - name: Download latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo $GITHUB_REPOSITORY --pattern umami-sqlite.zip
          unzip -q umami-sqlite.zip -d umami

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        uses: docker/build-push-action@v7
        with:
          context: ./umami
          tags: ${{ env.REGISTRY_IMAGE }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,push=true,push-by-digest=true
          provenance: false

      - name: Export digest
        working-directory: ${{ runner.temp }}
        env:
          IMG_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir digest
          touch "digest/${IMG_DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digest/*
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-push
    steps:
      - name: Prepare
        run: echo "REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create --tag ${REGISTRY_IMAGE}:latest \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)
